name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-api:
    name: Go API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - name: Run tests
        working-directory: api
        run: go test -race ./...

  go-runner:
    name: Go Runner build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - name: Build
        working-directory: runner
        run: go build ./...

  js-unit:
    name: JS unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/internal/api/client/package-lock.json
      - name: Install dependencies
        working-directory: api/internal/api/client
        run: npm ci
      - name: Run tests
        working-directory: api/internal/api/client
        run: npm test
